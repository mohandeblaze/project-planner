version: '3'

services:
  db:
    image: postgres:16.1
    restart: always
    environment:
      POSTGRES_DB: ${PG_DB_PROJECT_PLANNER}
      POSTGRES_PASSWORD: ${PG_DB_PROJECT_PLANNER_PASSWORD}
    volumes:
      - pg_data_vol:/var/lib/postgresql/data

  projectplanner:
    image: mohandeblaze/project-planner:latest
    restart: always
    depends_on:
      - db
    ports:
      - 80:80
    links:
      - db:database
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - mohandeblaze/project-planner:latest
        - mohandeblaze/project-planner:${TIMESTAMP}

volumes:
  pg_data_vol:
    name: pg_data_vol
